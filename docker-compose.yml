services:
  xuanjige:
    build: .
    image: xuanjige:latest
    container_name: xuanjige
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:5000"
    env_file:
      - .env
    environment:
      PORT: 5000
      NODE_ENV: production
    volumes:
      # 持久化书籍内容（1291 本古籍文本）
      - ./public/book-content:/app/public/book-content
      # 本地存储兜底目录（未配置 S3 时使用）
      - ./.local-storage:/app/.local-storage
