ai_provider:
  provider: doubao
  display_name: 豆包大模型（火山引擎）
  api_base: https://ark.cn-beijing.volces.com/api/v3
  api_key: YOUR_DOUBAO_API_KEY_HERE
  api_key_env: DOUBAO_API_KEY
  model: doubao-pro-32k
  auth_type: bearer
available_models:
- doubao-pro-4k
- doubao-pro-32k
- doubao-pro-128k
- doubao-lite-4k
- doubao-lite-32k
- doubao-lite-128k
request_defaults:
  temperature: 0.7
  max_tokens: 4096
  top_p: 1.0
  stream: true
retry_policy:
  max_retries: 3
  retry_delay: 1.0
  timeout: 60
